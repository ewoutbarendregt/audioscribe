<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Record, transcribe and review conversations with AI — live captions, read-aloud summary and on-the-spot revisions.">
<meta name="theme-color" content="#100F0D">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
<title>Audioscribe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesque:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #100F0D;
    color: #F4EFE6;
    font-family: 'Hanken Grotesque', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }
  button { font-family: inherit; }
  @keyframes asWave { 0% { transform: scaleY(0.22); } 100% { transform: scaleY(1); } }
  @keyframes asPulse { 0% { transform: scale(1); opacity: 0.55; } 70% { transform: scale(1.85); opacity: 0; } 100% { opacity: 0; } }
  @keyframes asBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes asFade { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: none; } }
  @keyframes asShimmer { 0% { background-position: -420px 0; } 100% { background-position: 420px 0; } }
  @keyframes asMic { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(244,239,230,0.13); border-radius: 8px; border: 2px solid #100F0D; }
  ::-webkit-scrollbar-track { background: transparent; }
  textarea::placeholder { color: rgba(244,239,230,0.32); }
  .as-hover:hover { filter: brightness(1.08); }
  .as-soft:hover { background: rgba(244,239,230,0.07) !important; }
  .kw { transition: color .12s, background .12s; }
  .glow-tl { position: fixed; top: -180px; right: -120px; width: 520px; height: 520px; border-radius: 50%; background: radial-gradient(circle, rgba(233,162,59,0.10), transparent 65%); pointer-events: none; z-index: 0; }
  .glow-bl { position: fixed; bottom: -200px; left: -140px; width: 560px; height: 560px; border-radius: 50%; background: radial-gradient(circle, rgba(108,192,138,0.06), transparent 65%); pointer-events: none; z-index: 0; }
</style>
</head>
<body>
<div class="glow-tl"></div>
<div class="glow-bl"></div>
<div id="app" style="position:relative;z-index:1;"></div>

<script>
/* =========================================================================
   Audioscribe — warm-dark, voice-first UI.
   Home (record / upload) → Live (real-time transcription) → Review (read-aloud
   summary with agree / object-and-revise). Wired to the FastAPI backend:
     POST  api/transcribe       (SSE upload transcription)
     POST  api/summarize-live   (structured review blocks)
     POST  api/amend-summary    (revise one block from an objection)
     WS    api/live-record      (Gemini Live realtime transcription)
   ========================================================================= */

// ---------------------------------------------------------------------------
// Auth token (Bearer for HTTP, ?token= for the WebSocket)
// ---------------------------------------------------------------------------
const TOKEN_KEY = 'audioscribe_token';
const getToken = () => localStorage.getItem(TOKEN_KEY) || '';
function promptForToken() {
  const token = window.prompt('Enter your API token to use Audioscribe.\n(Leave empty if no token is configured.)', getToken());
  if (token !== null) { localStorage.setItem(TOKEN_KEY, token.trim()); }
}
const authHeaders = () => { const t = getToken(); return t ? { 'Authorization': 'Bearer ' + t } : {}; };
const baseDir = () => location.pathname.replace(/[^/]*$/, '');
const apiUrl = (p) => baseDir() + p;
function wsUrl() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const t = getToken();
  return proto + '//' + location.host + baseDir() + 'api/live-record' + (t ? ('?token=' + encodeURIComponent(t)) : '');
}

// ---------------------------------------------------------------------------
// Palette / helpers
// ---------------------------------------------------------------------------
const SP_COLORS = ['#6FB7C4', '#C98AB0', '#9C8BD0', '#7FB069', '#E0915E'];
const ACCENT = '#E9A23B';
const RATE_STEPS = [0.85, 1, 1.15];
const _spColorMap = {};
function speakerColor(name) {
  if (!_spColorMap[name]) {
    const idx = Object.keys(_spColorMap).length % SP_COLORS.length;
    _spColorMap[name] = SP_COLORS[idx];
  }
  return _spColorMap[name];
}
function initials(name) {
  const parts = String(name || '?').trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function hexA(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}
function fmtTime(sec) { const m = Math.floor(sec / 60), s = sec % 60; return `${m}:${String(s).padStart(2, '0')}`; }
const isMobile = () => window.innerWidth <= 640;

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const S = {
  screen: 'home',            // home | live | review
  recStatus: 'idle',         // idle | recording | paused
  elapsed: 0,
  segments: [],              // {speaker, text, time}
  subtitle: 'Listening…',
  subtitleSpeaker: null,
  title: 'New conversation',
  source: 'live',            // live | upload
  uploadName: null,
  uploadError: null,
  reviewLoading: false,
  loadingMsg: '',
  blocks: [],                // {id, type, text, owner, due, agreement}
  activeId: null,
  playing: false,
  wordIndex: 0,
  listening: false,
  listenId: null,
  captured: '',
  rateIdx: 1,
  dragover: false,
  showTranscript: false,     // full diarized transcript panel on the review screen
  log: [],                   // live activity log shown while transcribing/summarizing
  overview: '',              // complete prose summary of the conversation
};

// runtime (non-render) handles
let _elapsedTimer = null;
let _readTimer = null;
let _utter = null;
let _wordCount = 0;
let _ws = null;
let _micCtx = null;
let _micStream = null;
let _micNode = null;
let _liveBuf = '';                 // accumulating interim transcript
let _captureMode = false;          // mic feeding the objection textarea
let _playCtx = null;               // model-audio playback
let _playHead = 0;

const rate = () => RATE_STEPS[S.rateIdx];

// ===========================================================================
// Rendering
// ===========================================================================
const app = document.getElementById('app');

function render() {
  const m = isMobile();
  let html = headerHTML(m);
  if (S.screen === 'home') html += homeHTML(m);
  else if (S.screen === 'live') html += liveHTML(m);
  else if (S.screen === 'review') html += reviewHTML(m);
  if (S.listening) html += listeningHTML();
  app.innerHTML = html;
  wireDynamic();
}

function headerHTML(m) {
  const agreed = S.blocks.filter(b => b.agreement !== 'pending').length;
  let right = '';
  if (S.screen === 'live') {
    const label = S.recStatus === 'paused' ? 'PAUSED' : 'REC';
    right = `
      <div style="display:flex;align-items:center;gap:9px;padding:7px 13px;border-radius:999px;background:rgba(224,115,94,0.13);border:1px solid rgba(224,115,94,0.32);">
        <span style="width:8px;height:8px;border-radius:50%;background:#E0735E;animation:asBlink 1.4s infinite;"></span>
        <span style="font-size:12px;font-weight:700;letter-spacing:0.04em;color:#E0735E;">${label}</span>
      </div>
      <span style="font-family:'JetBrains Mono',monospace;font-size:13.5px;color:#CFC8BA;letter-spacing:0.02em;">${fmtTime(S.elapsed)}</span>`;
  } else if (S.screen === 'review' && !S.reviewLoading) {
    right = `
      <div style="display:flex;align-items:center;gap:9px;padding:7px 14px;border-radius:999px;background:rgba(108,192,138,0.12);border:1px solid rgba(108,192,138,0.28);">
        <span style="font-size:13px;">✓</span>
        <span style="font-size:12.5px;font-weight:700;color:#6CC08A;">${agreed}/${S.blocks.length} confirmed</span>
      </div>`;
  }
  const showMeta = !m && S.screen !== 'home';
  const meta = S.screen === 'review'
    ? `${S.blocks.length} points to confirm`
    : (S.screen === 'live' ? `${S.segments.length} turns · Today` : '');
  const titleStyle = m
    ? "font-size:14px;font-weight:600;letter-spacing:-0.01em;max-width:46vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
    : "font-size:14.5px;font-weight:600;letter-spacing:-0.01em;";
  return `
  <header style="position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:${m ? '10px' : '16px'};padding:${m ? '12px 16px' : '15px 28px'};border-bottom:1px solid rgba(244,239,230,0.08);background:rgba(16,15,13,0.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);">
    <div style="display:flex;align-items:center;gap:13px;min-width:0;">
      <div data-act="goHome" title="Back to home" class="as-soft" style="display:flex;align-items:center;gap:9px;flex:none;cursor:pointer;padding:5px 8px;margin:-5px -2px;border-radius:10px;">
        <div style="width:13px;height:13px;border-radius:50%;background:${ACCENT};box-shadow:0 0 14px rgba(233,162,59,0.75);"></div>
        <span style="font-weight:800;font-size:16px;letter-spacing:-0.02em;">audioscribe</span>
      </div>
      <div style="width:1px;height:24px;background:rgba(244,239,230,0.13);flex:none;"></div>
      <div style="min-width:0;">
        <div style="${titleStyle}">${esc(S.title)}</div>
        ${showMeta ? `<div style="font-size:11.5px;color:#A39B8C;">${esc(meta)}</div>` : ''}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">${right}</div>
  </header>`;
}

function homeHTML(m) {
  return `
  <main style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:calc(100vh - 120px);padding:${m ? '30px 20px 60px' : '40px 28px 80px'};max-width:620px;margin:0 auto;">
    <div style="font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#A39B8C;margin-bottom:26px;">Audioscribe</div>

    <button data-act="startRecording" title="Start recording" style="position:relative;display:flex;align-items:center;justify-content:center;width:188px;height:188px;border:none;background:transparent;padding:0;cursor:pointer;border-radius:50%;">
      <div style="position:absolute;width:188px;height:188px;border-radius:50%;background:radial-gradient(circle,rgba(233,162,59,0.14),transparent 68%);"></div>
      <div style="position:absolute;width:150px;height:150px;border-radius:50%;border:1.5px solid rgba(233,162,59,0.32);"></div>
      <div class="as-hover" style="position:relative;width:118px;height:118px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#E8836E,#b8442f);display:flex;align-items:center;justify-content:center;box-shadow:0 14px 40px rgba(224,115,94,0.42);">
        <div style="width:34px;height:34px;border-radius:50%;background:#fff;"></div>
      </div>
    </button>

    <div style="font-family:'Newsreader',serif;font-size:30px;font-weight:600;letter-spacing:-0.01em;margin-top:30px;">Ready when you are</div>
    <div style="font-size:15px;color:#A39B8C;margin-top:9px;max-width:380px;line-height:1.55;">Tap record to start capturing the conversation. Audioscribe transcribes live as people talk, then reads the summary back for everyone to confirm.</div>

    <button data-act="startRecording" class="as-hover" style="display:flex;align-items:center;gap:10px;margin-top:30px;padding:14px 26px;border-radius:14px;border:none;background:${ACCENT};color:#1a1206;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 26px rgba(233,162,59,0.34);">
      <span style="width:11px;height:11px;border-radius:50%;background:#1a1206;"></span> Start recording
    </button>

    <div style="display:flex;align-items:center;gap:14px;width:100%;max-width:430px;margin-top:38px;">
      <div style="flex:1;height:1px;background:rgba(244,239,230,0.1);"></div>
      <span style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#6f685c;">or</span>
      <div style="flex:1;height:1px;background:rgba(244,239,230,0.1);"></div>
    </div>

    <label for="asFileInput" id="asDrop" style="display:flex;flex-direction:column;align-items:center;gap:7px;width:100%;max-width:430px;padding:26px 22px;border-radius:18px;border:1.5px dashed ${S.dragover ? 'rgba(233,162,59,0.6)' : 'rgba(244,239,230,0.18)'};background:${S.dragover ? 'rgba(233,162,59,0.08)' : 'rgba(244,239,230,0.025)'};cursor:pointer;transition:border-color .2s, background .2s;text-align:center;margin-top:14px;">
      <div style="width:42px;height:42px;border-radius:12px;background:rgba(233,162,59,0.12);border:1px solid rgba(233,162,59,0.28);display:flex;align-items:center;justify-content:center;color:${ACCENT};font-size:19px;">↥</div>
      <div style="font-size:15px;font-weight:600;color:#EDE6D9;">Upload an audio file to transcribe</div>
      <div style="font-size:12.5px;color:#A39B8C;">Drop it here or click to browse</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#6f685c;margin-top:4px;">MP3 · M4A · WAV · FLAC · OGG · up to 100MB</div>
    </label>
    <input id="asFileInput" type="file" accept=".mp3,.m4a,.wav,.flac,.ogg,.webm,.mp4,.aac" style="display:none;" />
    ${S.uploadError ? `<div style="margin-top:12px;padding:9px 14px;border-radius:11px;background:rgba(224,115,94,0.12);border:1px solid rgba(224,115,94,0.3);color:#E0735E;font-size:12.5px;font-weight:600;max-width:430px;">${esc(S.uploadError)}</div>` : ''}
    <div data-act="setToken" style="margin-top:30px;font-size:12px;color:#6f685c;cursor:pointer;text-decoration:underline;">Set API token</div>
  </main>`;
}

function liveHTML(m) {
  const recording = S.recStatus === 'recording';
  const headline = S.recStatus === 'paused' ? 'Recording paused' : 'Listening…';
  const sub = S.recStatus === 'paused'
    ? 'Tap the orb to resume — the transcript continues where it left off.'
    : 'Transcribing in real time. Tap the orb to pause.';

  const orb = recording ? `
    <div data-act="togglePause" title="Tap to pause" style="position:relative;display:flex;align-items:center;justify-content:center;width:158px;height:158px;cursor:pointer;">
      <div style="position:absolute;width:118px;height:118px;border-radius:50%;border:2px solid rgba(224,115,94,0.5);animation:asPulse 2.4s infinite;"></div>
      <div style="position:absolute;width:118px;height:118px;border-radius:50%;border:2px solid rgba(224,115,94,0.5);animation:asPulse 2.4s infinite 1.2s;"></div>
      <div style="position:relative;width:108px;height:108px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#E8836E,#b8442f);display:flex;align-items:center;justify-content:center;box-shadow:0 0 44px rgba(224,115,94,0.5);">
        <div style="display:flex;align-items:center;gap:3.5px;height:42px;">
          ${[0, 0.18, 0.36, 0.12, 0.42, 0.24, 0.06].map(d =>
            `<div style="width:4px;height:40px;border-radius:3px;background:#fff;transform-origin:center;animation:asWave 0.7s ease-in-out infinite alternate;animation-delay:${d}s;"></div>`).join('')}
        </div>
      </div>
    </div>` : `
    <div data-act="togglePause" title="Tap to resume" style="position:relative;display:flex;align-items:center;justify-content:center;width:158px;height:158px;cursor:pointer;">
      <div style="position:relative;width:108px;height:108px;border-radius:50%;background:#26221d;border:1px solid rgba(244,239,230,0.18);display:flex;align-items:center;justify-content:center;">
        <div style="width:34px;height:34px;border-radius:50%;background:#E0735E;box-shadow:0 0 18px rgba(224,115,94,0.5);"></div>
      </div>
    </div>`;

  const subSp = S.subtitleSpeaker;
  const subChip = subSp ? `<span style="margin-left:2px;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;background:${hexA(speakerColor(subSp), 0.18)};color:${speakerColor(subSp)};">${esc(subSp)}</span>` : '';

  const present = [...new Set(S.segments.map(s => s.speaker))];
  const chips = present.map(name => {
    const c = speakerColor(name);
    return `<div style="display:inline-flex;align-items:center;gap:8px;padding:7px 13px 7px 7px;border-radius:999px;background:rgba(244,239,230,0.04);border:1px solid rgba(244,239,230,0.09);font-size:13px;font-weight:600;color:#E4DDD0;">
      <span style="width:24px;height:24px;border-radius:50%;background:${c};color:#15110c;font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;">${initials(name)}</span>
      <span>${esc(name)}</span></div>`;
  }).join('') || `<div style="font-size:13px;color:#6f685c;">Speakers will appear as people talk…</div>`;

  return `
  <main style="position:relative;z-index:2;display:flex;gap:${m ? '16px' : '22px'};padding:${m ? '18px 14px 36px' : '26px 28px 40px'};max-width:1320px;margin:0 auto;align-items:stretch;flex-wrap:wrap;">
    <section style="flex:1 1 470px;display:flex;flex-direction:column;gap:18px;min-width:280px;">
      <div style="position:relative;border:1px solid rgba(244,239,230,0.09);background:linear-gradient(180deg,#1c1814,#161310);border-radius:24px;padding:36px 26px 30px;overflow:hidden;display:flex;flex-direction:column;align-items:center;gap:20px;">
        <div style="position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:300px;height:200px;background:radial-gradient(circle,rgba(224,115,94,0.16),transparent 70%);pointer-events:none;"></div>
        ${orb}
        <div style="text-align:center;">
          <div style="font-size:22px;font-weight:700;letter-spacing:-0.01em;">${headline}</div>
          <div style="font-size:13.5px;color:#A39B8C;margin-top:5px;max-width:340px;">${sub}</div>
        </div>
        <div style="display:flex;gap:12px;width:100%;max-width:380px;">
          <button data-act="stopAndSummarize" class="as-hover" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:13px;border:none;background:${ACCENT};color:#1a1206;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(233,162,59,0.3);">■&nbsp; Stop &amp; summarize</button>
        </div>
      </div>

      <div style="border:1px dashed rgba(233,162,59,0.34);background:rgba(233,162,59,0.045);border-radius:18px;padding:18px 20px;min-height:104px;display:flex;flex-direction:column;gap:11px;">
        <div style="display:flex;align-items:center;gap:9px;">
          <span style="width:7px;height:7px;border-radius:50%;background:${ACCENT};animation:asBlink 1.4s infinite;"></span>
          <span style="font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:${ACCENT};">Live caption</span>
          ${subChip}
        </div>
        <div style="font-family:'Newsreader',serif;font-size:19px;line-height:1.45;color:#EDE6D9;">${esc(S.subtitle)}</div>
      </div>

      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#A39B8C;margin-bottom:11px;">In the room</div>
        <div style="display:flex;gap:9px;flex-wrap:wrap;">${chips}</div>
      </div>
    </section>

    <section style="flex:1 1 440px;display:flex;flex-direction:column;border:1px solid rgba(244,239,230,0.09);background:#161310;border-radius:24px;overflow:hidden;min-height:560px;min-width:280px;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid rgba(244,239,230,0.08);">
        <div style="font-size:14.5px;font-weight:700;">Live transcript</div>
        <div style="display:flex;align-items:center;gap:7px;font-size:11.5px;color:#A39B8C;">
          <span style="width:6px;height:6px;border-radius:50%;background:#6CC08A;"></span>
          appending live · ${S.segments.length} turns
        </div>
      </div>
      <div id="asTranscript" style="flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:18px;">
        ${S.segments.map(segHTML).join('') || `<div style="color:#6f685c;font-size:14px;margin:auto;text-align:center;">Waiting for the first words…</div>`}
      </div>
    </section>
  </main>`;
}

function segHTML(seg) {
  const c = speakerColor(seg.speaker);
  return `<div style="display:flex;gap:13px;animation:asFade 0.45s ease;">
    <div style="flex:none;width:34px;height:34px;border-radius:11px;background:${hexA(c, 0.16)};color:${c};border:1px solid ${hexA(c, 0.32)};font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;">${initials(seg.speaker)}</div>
    <div style="flex:1;min-width:0;">
      <div style="display:flex;gap:9px;align-items:baseline;margin-bottom:3px;">
        <span style="font-size:13.5px;font-weight:700;color:${c};">${esc(seg.speaker)}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(244,239,230,0.4);">${esc(seg.tsText || fmtTime(seg.time || 0))}</span>
      </div>
      <div style="font-size:14.5px;color:#CFC8BA;line-height:1.52;">${esc(seg.text)}</div>
    </div>
  </div>`;
}

function transcriptPanelHTML() {
  if (!S.segments.length) return '';
  const open = S.showTranscript;
  const speakers = new Set(S.segments.map(s => s.speaker)).size;
  return `<div style="margin-top:34px;border:1px solid rgba(244,239,230,0.09);background:#161310;border-radius:18px;overflow:hidden;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;flex-wrap:wrap;">

        <button data-act="exportTranscript" style="display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:11px;border:1px solid rgba(244,239,230,0.14);background:rgba(244,239,230,0.05);color:#F4EFE6;font-size:12.5px;font-weight:600;cursor:pointer;">⬇ Transcript</button>
        ${S.blocks.length ? `<button data-act="exportSummary" style="display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:11px;border:1px solid rgba(244,239,230,0.14);background:rgba(244,239,230,0.05);color:#F4EFE6;font-size:12.5px;font-weight:600;cursor:pointer;">⬇ Summary</button>` : ''}

    ${open ? `<div style="display:flex;flex-direction:column;gap:18px;padding:6px 20px 20px;border-top:1px solid rgba(244,239,230,0.07);">${S.segments.map(segHTML).join('')}</div>` : ''}

}

// Small scrollable activity log (~3 lines) shown while the system works.
function logBoxHTML() {
  if (!S.log.length) return '';
  return `<div style="border:1px solid rgba(244,239,230,0.09);border-radius:12px;background:#141210;overflow:hidden;">
    <div style="display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid rgba(244,239,230,0.07);">

    <div id="asLog" style="height:60px;overflow-y:auto;padding:8px 13px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55;color:#A39B8C;">
      ${S.log.map(l => `<div>${esc(l)}</div>`).join('')}

}

// Complete prose summary of the conversation, shown above the points to confirm.
function overviewHTML() {
  if (!S.overview) return '';
  const paras = S.overview.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);
  return `<div style="margin-bottom:30px;border:1px solid rgba(244,239,230,0.09);background:rgba(244,239,230,0.025);border-radius:16px;padding:20px 22px;">
    <div style="font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#A39B8C;margin-bottom:12px;">Summary</div>
    ${paras.map((p, i) => `<p style="font-family:'Newsreader',serif;font-size:17px;line-height:1.62;color:#E4DDD0;margin:0;${i ? 'margin-top:12px;' : ''}">${esc(p)}</p>`).join('')}
  </div>`;
}

function reviewHTML(m) {
  const agreed = S.blocks.filter(b => b.agreement !== 'pending').length;
  const total = S.blocks.length;
  const actionCount = S.blocks.filter(b => b.type === 'action').length;
  const allDone = !S.reviewLoading && total > 0 && agreed === total;

  let body;
  if (S.reviewLoading) {
    body = `
      <div style="display:flex;flex-direction:column;gap:16px;">
        ${[120, '100%', '100%', '100%'].map((w, i) =>
          `<div style="height:${i === 0 ? '14px' : '64px'};width:${typeof w === 'number' ? w + 'px' : w};border-radius:${i === 0 ? '6px' : '14px'};background:linear-gradient(90deg,#1a1714,#221e19,#1a1714);background-size:420px 100%;animation:asShimmer 1.3s infinite;"></div>`).join('')}
        <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-top:10px;color:#A39B8C;font-size:13.5px;">
          <span style="width:7px;height:7px;border-radius:50%;background:${ACCENT};animation:asBlink 1s infinite;"></span>${esc(S.loadingMsg || 'Summarizing…')}
        </div>
        ${logBoxHTML()}
      </div>`;
  } else {
    const summaries = S.blocks.filter(b => b.type === 'summary');
    const actions = S.blocks.filter(b => b.type === 'action');
    body = `
      ${overviewHTML()}
      ${summaries.length ? `<div style="font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#A39B8C;margin-bottom:14px;">${S.overview ? 'Key points to confirm' : 'Summary'}</div>
      <div>${summaries.map((b, i) => cardHTML(b, i + 1, m)).join('')}</div>` : ''}
      ${actions.length ? `<div style="font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#A39B8C;margin:34px 0 14px;display:flex;align-items:center;gap:10px;">Action items <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${ACCENT};font-weight:500;letter-spacing:0;">${actionCount}</span></div>
      <div>${actions.map((b, i) => cardHTML(b, i + 1, m)).join('')}</div>` : ''}
      ${total === 0 ? `<div style="color:#A39B8C;font-size:15px;text-align:center;padding:30px;">${S.segments.length ? 'No summary points were produced — see the full transcript below.' : 'No speech could be detected in this audio. Try a clearer recording.'}</div>` : ''}
      ${transcriptPanelHTML()}
      ${allDone ? doneHTML(total) : ''}`;
  }

  return `
  <main style="position:relative;z-index:2;max-width:940px;margin:0 auto;padding:${m ? '22px 16px 160px' : '30px 28px 170px'};">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;">
      <div style="flex:1;min-width:240px;">
        <div style="font-family:'Newsreader',serif;font-size:${m ? '24px' : '30px'};font-weight:600;letter-spacing:-0.01em;">Review &amp; confirm with the room</div>
        <div style="font-size:14px;color:#A39B8C;margin-top:6px;max-width:560px;line-height:1.5;">Audioscribe reads each point aloud. Tap any line to start from there. If someone objects, hit <span style="color:#E0735E;font-weight:600;">Interrupt</span> — capture what they say and revise that item on the spot.</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:14px;border:1px solid rgba(244,239,230,0.1);background:rgba(244,239,230,0.03);">
        <span style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:${ACCENT};">${agreed}</span>
        <span style="font-size:13px;color:#A39B8C;">of ${total}<br>confirmed</span>

    </div>

function badgeHTML(agreement) {
  if (agreement === 'agreed') return `<span style="padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:700;background:rgba(108,192,138,0.16);color:#6CC08A;white-space:nowrap;">✓ Confirmed</span>`;
  if (agreement === 'revised') return `<span style="padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:700;background:rgba(233,162,59,0.16);color:${ACCENT};white-space:nowrap;">↻ Revised</span>`;
  return '';
}

function karaokeHTML(block, active) {
  if (!active) return esc(block.text);
  const toks = block.text.split(/(\s+)/);
  let wi = -1;
  return toks.map(tok => {
    if (/\S/.test(tok)) {
      wi++;
      const cur = wi === S.wordIndex, spoken = wi < S.wordIndex;
      const color = cur ? '#1a1206' : (spoken ? '#F4EFE6' : 'rgba(244,239,230,0.4)');
      const bg = cur ? ACCENT : 'transparent';
      const pad = cur ? '1px 4px' : '0';
      const radius = cur ? '6px' : '0';
      return `<span class="kw" style="color:${color};background:${bg};border-radius:${radius};padding:${pad};-webkit-box-decoration-break:clone;box-decoration-break:clone;">${esc(tok)}</span>`;
    }
    return tok;
  }).join('');
}

function controlRowHTML(block) {
  const agreed = block.agreement === 'agreed';

  return `<div style="display:flex;gap:9px;margin-top:14px;">

    <button data-act="object" data-id="${block.id}" style="display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:10px;border:none;cursor:pointer;font-size:12.5px;font-weight:700;background:${revised ? 'rgba(233,162,59,0.14)' : 'rgba(224,115,94,0.1)'};color:${revised ? ACCENT : '#E0735E'};">${revised ? '↻ Revise again' : '🎙 Object & revise'}</button>

}

  const active = block.id === S.activeId;

  const bar = active ? `<div style="position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:${ACCENT};box-shadow:0 0 12px ${hexA(ACCENT, 0.6)};"></div>` : '';

      <span style="font-size:12.5px;font-weight:600;color:${c};">${esc(block.owner)}</span></span>` : '';
    const dueChip = (block.due && block.due !== '—') ? `<span style="display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#A39B8C;">🗓 ${esc(block.due)}</span>` : '';

  } else {
    topLeft = `<span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:rgba(244,239,230,0.4);font-weight:500;">${String(n).padStart(2, '0')}</span>`;
  }
  const fs = isAction ? (m ? '16px' : '18px') : (m ? '17.5px' : '20.5px');
  const txtColor = active ? '#F4EFE6' : (isAction ? 'rgba(244,239,230,0.58)' : 'rgba(244,239,230,0.52)');
  return `<div data-act="jump" data-id="${block.id}" id="blk-${block.id}" style="position:relative;cursor:pointer;padding:${isAction ? '16px 20px 15px 26px' : '18px 20px 16px 26px'};border-radius:16px;margin-bottom:10px;background:${active ? 'rgba(233,162,59,0.07)' : (isAction ? 'rgba(244,239,230,0.025)' : 'transparent')};border:1px solid ${active ? 'rgba(233,162,59,0.28)' : 'rgba(244,239,230,0.07)'};transition:background .25s, border-color .25s;">
    ${bar}

}

function listeningHTML() {

      </div>
      <div style="padding:12px 15px;border-radius:13px;background:rgba(244,239,230,0.04);border:1px solid rgba(244,239,230,0.08);margin-bottom:14px;">

      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;flex-wrap:wrap;">

// Re-attach listeners for elements that can't use click-delegation.
function wireDynamic() {
  const fileInput = document.getElementById('asFileInput');
  if (fileInput) {
    fileInput.addEventListener('change', e => { const f = e.target.files && e.target.files[0]; if (f) ingestFile(f); e.target.value = ''; });
  }
  const drop = document.getElementById('asDrop');
  if (drop) {
    drop.addEventListener('dragover', e => { e.preventDefault(); if (!S.dragover) { S.dragover = true; render(); } });
    drop.addEventListener('dragleave', e => { e.preventDefault(); S.dragover = false; render(); });
    drop.addEventListener('drop', e => { e.preventDefault(); S.dragover = false; const f = e.dataTransfer.files && e.dataTransfer.files[0]; if (f) ingestFile(f); else render(); });
  }
  const cap = document.getElementById('capturedText');
  if (cap) {
    cap.addEventListener('input', e => { stopMicCapture(); S.captured = e.target.value; });
  }
  if (S.screen === 'live') scrollTranscript();
  const logEl = document.getElementById('asLog');
  if (logEl) logEl.scrollTop = logEl.scrollHeight;
}

function scrollTranscript() {
  const el = document.getElementById('asTranscript');
  if (el) el.scrollTop = el.scrollHeight;
}

// Append a line to the activity log (cap history) and refresh it while loading.
function pushLog(line) {
  if (!line) return;
  S.log.push(String(line));
  if (S.log.length > 200) S.log = S.log.slice(-200);
  if (S.reviewLoading) render();
}

// ===========================================================================
// Click delegation
// ===========================================================================
document.addEventListener('click', e => {
  const t = e.target.closest('[data-act]');
  if (!t) return;
  const act = t.getAttribute('data-act');
  const id = t.getAttribute('data-id');
  const fn = ACTIONS[act];
  if (fn) { e.preventDefault(); fn(id); }
});

const ACTIONS = {
  goHome, startRecording, togglePause, stopAndSummarize,
  setToken: () => { promptForToken(); },
  agree: id => agree(id),
  object: id => objectBlock(id),
  objectActive: () => objectBlock(S.activeId || (S.blocks[0] && S.blocks[0].id)),
  jump: id => jumpTo(id),
  togglePlay, prev, next, cycleRate,
  cancelListen, applyRevision,
  exportSummary, exportTranscript,
  toggleTranscript: () => { S.showTranscript = !S.showTranscript; render(); },
};

// ===========================================================================
// Navigation
// ===========================================================================
function goHome() {
  stopReadAloud();
  stopMicCapture();
  stopLive();
  Object.assign(S, {
    screen: 'home', recStatus: 'idle', playing: false, listening: false, dragover: false,
    uploadError: null, source: 'live', segments: [], elapsed: 0,
    subtitle: 'Listening…', subtitleSpeaker: null, title: 'New conversation',
    reviewLoading: false, blocks: [], activeId: null, wordIndex: 0, listenId: null, captured: '',
    showTranscript: false, log: [], overview: '',
  });
  render();
}

// ===========================================================================
// LIVE: mic capture + WebSocket to Gemini Live
// ===========================================================================
const WORKLET_SRC = `
class PCMWorklet extends AudioWorkletProcessor {
  process(inputs) {
    const ch = inputs[0][0];
    if (!ch) return true;
    const ratio = sampleRate / 16000;
    const outLen = Math.floor(ch.length / ratio);
    const out = new Int16Array(outLen);
    for (let i = 0; i < outLen; i++) {
      let s = ch[Math.floor(i * ratio)];
      s = Math.max(-1, Math.min(1, s));
      out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    this.port.postMessage(out.buffer, [out.buffer]);
    return true;
  }
}
registerProcessor('pcm-worklet', PCMWorklet);
`;

async function startMic(onAudioBuffer) {
  _micStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
  _micCtx = new (window.AudioContext || window.webkitAudioContext)();
  const blobUrl = URL.createObjectURL(new Blob([WORKLET_SRC], { type: 'application/javascript' }));
  await _micCtx.audioWorklet.addModule(blobUrl);
  URL.revokeObjectURL(blobUrl);
  const src = _micCtx.createMediaStreamSource(_micStream);
  _micNode = new AudioWorkletNode(_micCtx, 'pcm-worklet');
  _micNode.port.onmessage = ev => onAudioBuffer(ev.data);
  src.connect(_micNode);
  _micNode.connect(_micCtx.destination); // keeps the worklet pulled; it emits silence
}

function stopMic() {
  try { if (_micNode) _micNode.disconnect(); } catch (e) {}
  try { if (_micCtx) _micCtx.close(); } catch (e) {}
  try { if (_micStream) _micStream.getTracks().forEach(t => t.stop()); } catch (e) {}
  _micNode = _micCtx = _micStream = null;
}

function openWS(onMessage) {
  const ws = new WebSocket(wsUrl());
  ws.binaryType = 'arraybuffer';
  ws.onmessage = ev => { try { onMessage(JSON.parse(ev.data)); } catch (e) {} };
  ws.onerror = () => {};
  return ws;
}

async function startRecording() {
  stopReadAloud();
  Object.assign(S, {
    screen: 'live', recStatus: 'recording', source: 'live', playing: false,
    segments: [], elapsed: 0, subtitle: 'Listening…', subtitleSpeaker: null,
    title: 'Live conversation', blocks: [], activeId: null, wordIndex: 0,
  });
  _liveBuf = '';
  render();

  clearInterval(_elapsedTimer);
  _elapsedTimer = setInterval(() => { if (S.recStatus === 'recording') { S.elapsed++; if (S.screen === 'live') updateElapsed(); } }, 1000);

  try {
    _ws = openWS(handleLiveMessage);
    await new Promise((res, rej) => { _ws.onopen = res; _ws.addEventListener('error', rej, { once: true }); setTimeout(res, 3000); });
    await startMic(buf => { if (_ws && _ws.readyState === 1 && S.recStatus === 'recording') _ws.send(buf); });
  } catch (err) {
    console.error(err);
    S.subtitle = 'Microphone or connection unavailable. Check permissions and your API token, then try again.';
    render();
  }
}

function updateElapsed() {
  // lightweight: just re-render the header (elapsed + turn count live there)
  const header = app.querySelector('header');
  if (header) header.outerHTML = headerHTML(isMobile());
}

function handleLiveMessage(msg) {
  if (msg.type === 'user_transcript') {
    if (msg.text) { _liveBuf += msg.text; S.subtitle = _liveBuf; S.subtitleSpeaker = 'Speaker'; if (S.screen === 'live') render(); }
    if (msg.finished) commitLiveSegment();
  } else if (msg.type === 'turn_complete') {
    commitLiveSegment();
  } else if (msg.type === 'model_text') {
    const txt = (msg.text || '').replace(/^Assistant:\s*/i, '').trim();
    if (txt) { S.segments.push({ speaker: 'Assistant', text: txt, time: S.elapsed }); if (S.screen === 'live') render(); }
  } else if (msg.type === 'audio_chunk') {
    playModelAudio(msg.data);
  }
}

function commitLiveSegment() {
  const text = _liveBuf.trim();
  if (text) { S.segments.push({ speaker: 'Speaker', text, time: S.elapsed }); }
  _liveBuf = '';
  S.subtitle = 'Listening…'; S.subtitleSpeaker = null;
  if (S.screen === 'live') render();
}

function togglePause() {
  S.recStatus = S.recStatus === 'recording' ? 'paused' : 'recording';
  render();
}

function stopLive() {
  clearInterval(_elapsedTimer); _elapsedTimer = null;
  stopMic();
  try { if (_ws) _ws.close(); } catch (e) {}
  _ws = null;
}

// model audio playback (Gemini returns 24kHz PCM)
function playModelAudio(b64) {
  try {
    if (!_playCtx) { _playCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 }); _playHead = 0; }
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const pcm = new Int16Array(bytes.buffer);
    const buf = _playCtx.createBuffer(1, pcm.length, 24000);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < pcm.length; i++) ch[i] = pcm[i] / 32768;
    const src = _playCtx.createBufferSource();
    src.buffer = buf; src.connect(_playCtx.destination);
    const now = _playCtx.currentTime;
    _playHead = Math.max(_playHead, now);
    src.start(_playHead);
    _playHead += buf.duration;
  } catch (e) {}
}

// ===========================================================================
// Stop & summarize  +  Upload — both produce review blocks
// ===========================================================================
async function stopAndSummarize() {
  commitLiveSegment();
  stopLive();
  const segments = S.segments.slice();
  Object.assign(S, { screen: 'review', recStatus: 'idle', reviewLoading: true, loadingMsg: 'Summarizing the conversation & extracting action items…', playing: false, showTranscript: false, overview: '', log: [`✓ captured ${segments.length} turns`, 'Summarizing the conversation…'] });
  render();
  await summarizeSegments(segments, S.title);
}

function ingestFile(file) {
  const name = file.name || 'recording';
  const ext = ('.' + name.split('.').pop()).toLowerCase();
  const accept = ['.mp3', '.m4a', '.wav', '.flac', '.ogg', '.webm', '.mp4', '.aac'];
  if (accept.indexOf(ext) === -1) {
    S.uploadError = 'Unsupported file — use MP3, M4A, WAV, FLAC, OGG, WEBM, MP4 or AAC.';
    render(); return;
  }
  stopReadAloud(); stopLive();
  Object.assign(S, {
    screen: 'review', recStatus: 'idle', source: 'upload', uploadName: name, uploadError: null,
    title: name.replace(/\.[^.]+$/, ''), segments: [], blocks: [], activeId: null, wordIndex: 0,
    playing: false, reviewLoading: true, loadingMsg: 'Uploading ' + name + '…', showTranscript: true,
    log: ['↥ ' + name + ' queued for transcription'], overview: '',
  });
  render();
  transcribeUpload(file);
}

function transcribeUpload(file) {
  const fd = new FormData();
  fd.append('file', file);
  fetch(apiUrl('api/transcribe'), { method: 'POST', headers: authHeaders(), body: fd })
    .then(resp => {
      if (resp.status === 401) { S.reviewLoading = false; S.uploadError = 'Invalid or missing API token.'; S.screen = 'home'; render(); promptForToken(); return null; }
      if (!resp.ok || !resp.body) throw new Error('Transcription failed (' + resp.status + ')');
      return streamSSE(resp);
    })
    .catch(err => { console.error(err); S.reviewLoading = false; S.screen = 'home'; S.uploadError = 'Transcription failed. Please try again.'; render(); });
}

async function streamSSE(resp) {
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  let segments = [];
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const parts = buf.split('\n\n');
    buf = parts.pop();
    for (const part of parts) {
      const line = part.split('\n').find(l => l.startsWith('data:'));
      if (!line) continue;
      let evt; try { evt = JSON.parse(line.slice(5).trim()); } catch (e) { continue; }
      if (evt.type === 'progress') {
        S.loadingMsg = (evt.stage || 'Transcribing') + (evt.detail ? ' · ' + evt.detail : '');
        pushLog(`${evt.percent != null ? String(evt.percent).padStart(3) + '%  ' : ''}${evt.stage || ''}${evt.detail ? ' — ' + evt.detail : ''}`);
      } else if (evt.type === 'debug') {
        pushLog(evt.message);
      } else if (evt.type === 'result' && evt.success) {
        segments = (evt.segments || []).map(s => ({ speaker: s.speaker || 'Speaker', text: s.text, tsText: s.timestamp || '', time: 0 }));
        S.segments = segments;
        S.loadingMsg = 'Summarizing & extracting action items…';
        pushLog(`✓ transcribed ${segments.length} segments`);
      } else if (evt.type === 'error') { throw new Error(evt.message || 'Transcription failed'); }
    }
  }
  await summarizeSegments(segments, S.title);
}

async function summarizeSegments(segments, title) {
  if (!segments.length) { S.reviewLoading = false; S.blocks = []; render(); return; }
  try {
    const resp = await fetch(apiUrl('api/summarize-live'), {
      method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
      body: JSON.stringify({ segments: segments.map(s => ({ speaker: s.speaker, text: s.text })), title }),
    });
    if (resp.status === 401) { S.reviewLoading = false; S.screen = 'home'; render(); promptForToken(); return; }
    if (!resp.ok) throw new Error('Summary failed (' + resp.status + ')');
    const data = await resp.json();
    S.blocks = (data.blocks || []).map(b => Object.assign({ owner: '', due: '', agreement: 'pending' }, b));
    if (data.title) S.title = data.title;
    S.overview = data.overview || '';
    S.reviewLoading = false;
    S.activeId = S.blocks[0] ? S.blocks[0].id : null;
    S.wordIndex = 0;
    render();
  } catch (err) {
    console.error(err);
    S.reviewLoading = false;
    S.blocks = [];
    S.uploadError = 'Could not summarize the conversation.';
    render();
  }
}

// ===========================================================================
// Read-aloud engine (browser speechSynthesis + synced karaoke)
// ===========================================================================
function clearReadTimer() { if (_readTimer) { clearInterval(_readTimer); _readTimer = null; } }

function pickVoice() {
  try {
    const vs = window.speechSynthesis.getVoices() || [];
    return vs.find(v => /en[-_]US/i.test(v.lang) && /Google|Samantha|Natural|Jenny/i.test(v.name))
      || vs.find(v => /en[-_]US/i.test(v.lang)) || vs.find(v => /^en/i.test(v.lang)) || null;
  } catch (e) { return null; }
}

function speakBlock(id, fromWord) {
  clearReadTimer();
  const block = S.blocks.find(b => b.id === id);
  if (!block) return;
  const words = block.text.split(/\s+/).filter(Boolean);
  _wordCount = words.length;
  const start = fromWord || 0;
  S.activeId = id; S.wordIndex = start; S.playing = true; S.listening = false;
  render();
  scrollToBlock(id);

  try {
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      const prefix = (start === 0 && block.type === 'action' && block.owner) ? (block.owner + '. ') : '';
      const suffix = (start === 0 && block.type === 'action' && block.due && block.due !== '—') ? ('. Due ' + block.due + '.') : '';
      const u = new SpeechSynthesisUtterance(prefix + words.slice(start).join(' ') + suffix);
      u.rate = rate(); u.pitch = 1.0; u.lang = 'en-US';
      const v = pickVoice(); if (v) u.voice = v;
      _utter = u;
      window.speechSynthesis.speak(u);
    }
  } catch (e) {}

  const per = Math.max(150, Math.round(330 / rate()));
  _readTimer = setInterval(() => {
    const ni = S.wordIndex + 1;
    if (ni >= _wordCount) { clearReadTimer(); S.wordIndex = _wordCount - 1; renderReviewBlocks(); setTimeout(() => onBlockEnd(id), 420); return; }
    S.wordIndex = ni; renderReviewBlocks();
  }, per);
}

function onBlockEnd(id) {
  if (!S.playing) return;
  const order = S.blocks.map(b => b.id);
  const next = order[order.indexOf(id) + 1];
  if (next) speakBlock(next, 0);
  else { clearReadTimer(); try { window.speechSynthesis.cancel(); } catch (e) {} S.playing = false; render(); }
}

function stopReadAloud() {
  clearReadTimer();
  try { window.speechSynthesis.cancel(); } catch (e) {}
  S.playing = false;
}

// Light re-render of just the review blocks during karaoke ticks.
function renderReviewBlocks() {
  if (S.screen !== 'review') return;
  render();
}

function togglePlay() {
  if (S.playing) { stopReadAloud(); render(); return; }
  const id = S.activeId || (S.blocks[0] && S.blocks[0].id);
  if (!id) return;
  speakBlock(id, S.activeId ? S.wordIndex : 0);
}
function prev() {
  const order = S.blocks.map(b => b.id);
  const id = order[Math.max(0, order.indexOf(S.activeId || order[0]) - 1)];
  if (S.playing) speakBlock(id, 0); else { S.activeId = id; S.wordIndex = 0; render(); scrollToBlock(id); }
}
function next() {
  const order = S.blocks.map(b => b.id);
  const id = order[Math.min(order.length - 1, order.indexOf(S.activeId || order[0]) + 1)];
  if (S.playing) speakBlock(id, 0); else { S.activeId = id; S.wordIndex = 0; render(); scrollToBlock(id); }
}
function jumpTo(id) {
  if (S.playing) speakBlock(id, 0); else { S.activeId = id; S.wordIndex = 0; render(); scrollToBlock(id); }
}
function cycleRate() {
  S.rateIdx = (S.rateIdx + 1) % RATE_STEPS.length;
  render();
  if (S.playing && S.activeId) speakBlock(S.activeId, S.wordIndex);
}
function scrollToBlock(id) {
  setTimeout(() => {
    const el = document.getElementById('blk-' + id);
    if (el) { const r = el.getBoundingClientRect(); window.scrollTo({ top: window.scrollY + r.top - (window.innerHeight * 0.36), behavior: 'smooth' }); }
  }, 70);
}

// ===========================================================================
// Agree / Object / Revise
// ===========================================================================
function agree(id) {
  S.blocks = S.blocks.map(b => b.id === id ? Object.assign({}, b, { agreement: 'agreed' }) : b);
  render();
}

function objectBlock(id) {
  if (!id) return;
  stopReadAloud();
  Object.assign(S, { activeId: id, wordIndex: 0, listening: true, listenId: id, captured: '' });
  render();
  // Capture the participant's words live via the mic → transcript stream.
  beginObjectionCapture();
}

async function beginObjectionCapture() {
  _captureMode = true;
  _liveBuf = '';
  try {
    if (!_ws || _ws.readyState !== 1) {
      _ws = openWS(handleCaptureMessage);
      await new Promise((res) => { _ws.onopen = res; setTimeout(res, 3000); });
    } else {
      _ws.onmessage = ev => { try { handleCaptureMessage(JSON.parse(ev.data)); } catch (e) {} };
    }
    await startMic(buf => { if (_ws && _ws.readyState === 1 && _captureMode) _ws.send(buf); });
  } catch (e) {
    // Mic unavailable — the operator can still type the correction.
    _captureMode = false;
  }
}

function handleCaptureMessage(msg) {
  if (!_captureMode) return;
  if (msg.type === 'user_transcript' && msg.text) {
    _liveBuf += msg.text;
    S.captured = _liveBuf;
    const ta = document.getElementById('capturedText');
    if (ta && document.activeElement !== ta) ta.value = _liveBuf;
  }
}

function stopMicCapture() {
  if (!_captureMode) return;
  _captureMode = false;
  stopMic();
  try { if (_ws) _ws.close(); } catch (e) {}
  _ws = null;
}

function cancelListen() {
  stopMicCapture();
  S.listening = false; S.captured = '';
  render();
}

async function applyRevision() {
  const id = S.listenId;
  const block = S.blocks.find(b => b.id === id);
  const ta = document.getElementById('capturedText');
  const objection = ((ta ? ta.value : S.captured) || '').trim();
  stopMicCapture();
  if (!block || !objection) { cancelListen(); return; }

  // optimistic: show a transient revised state while the model rewrites
  S.listening = false; S.captured = '';
  render();

  try {
    const transcript = S.segments.map(s => `${s.speaker}: ${s.text}`).join('\n');
    const resp = await fetch(apiUrl('api/amend-summary'), {
      method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
      body: JSON.stringify({ block_type: block.type, block_text: block.text, owner: block.owner || '', due: block.due || '', objection, transcript }),
    });
    if (resp.status === 401) { render(); promptForToken(); return; }
    if (!resp.ok) throw new Error('Amend failed (' + resp.status + ')');
    const data = await resp.json();
    S.blocks = S.blocks.map(b => b.id === id ? Object.assign({}, b, {
      text: data.text || b.text,
      owner: block.type === 'action' ? (data.owner || b.owner) : b.owner,
      due: block.type === 'action' ? (data.due || b.due) : b.due,
      agreement: 'revised',
    }) : b);
  } catch (err) {
    console.error(err);
    // fall back to using the raw captured text
    S.blocks = S.blocks.map(b => b.id === id ? Object.assign({}, b, { text: objection, agreement: 'revised' }) : b);
  }
  render();
  setTimeout(() => speakBlock(id, 0), 360);
}

// ===========================================================================
// Export
// ===========================================================================
function download(content, filename) {
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportSummary() {
  let c = S.title + ' — Summary\n' + '='.repeat(46) + '\n\nSUMMARY\n';
  S.blocks.filter(b => b.type === 'summary').forEach((b, i) => { c += `\n${i + 1}. ${b.text}${b.agreement === 'revised' ? '  [revised]' : ''}`; });
  c += '\n\nACTION ITEMS\n';
  S.blocks.filter(b => b.type === 'action').forEach(b => { c += `\n• ${b.text}${b.owner ? ' — ' + b.owner : ''}${b.due && b.due !== '—' ? ', due ' + b.due : ''}${b.agreement === 'revised' ? '  [revised]' : ''}`; });
  download(c, 'summary.txt');
}
function exportTranscript() {
  let c = S.title + ' — Transcript\n' + '='.repeat(46) + '\n\n';
  S.segments.forEach(s => { c += `${s.speaker}: ${s.text}\n`; });
  download(c, 'transcript.txt');
}

// ===========================================================================
// Boot
// ===========================================================================
window.addEventListener('resize', () => render());
if (window.speechSynthesis) { try { window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged = () => {}; } catch (e) {} }
render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
